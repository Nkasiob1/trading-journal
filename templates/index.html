<!DOCTYPE html>
<html lang="en">
<head>
    <!--character encoding - supports all characters  -->
    <meta charset="UTF-8">

    <!-- Makes the page look good on mobile screens -->
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- The title that appears on the browser tab -->
    <title>GOAT Trading Journal</title>
    
    <!-- Link to CSS styling — we will create this file next -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Main heading -->
    <h1>GOAT Trading Journal</h1>
    
    <!-- Navigation links -->
    <nav>
        <a href="/">Journal</a>
        <a href="/dashboard">Dashboard</a>
    </nav>

    <!-- Trade logging form -->
    <h2>Log a Trade</h2>
    <form id="tradeForm">
    
        <!-- Pair selection -->
        <label>Pair:</label>
        <select name="pair" id="pair">
            <option value="EURUSD">EURUSD</option>
            <option value="GBPUSD">GBPUSD</option>
        </select>

        <!-- Session selection -->
        <label>Session:</label>
        <select name="session" id="session">
            <option value="London">London</option>
            <option value="New York">New York</option>
        </select>

        <!-- Entry price -->
        <label>Entry Price:</label>
        <input type="number" step="0.00001" id="entry" placeholder="1.14447">

        <!-- Stop Loss -->
        <label>Stop Loss:</label>
        <input type="number" step="0.00001" id="stop_loss" placeholder="1.14147">

        <!-- Take Profit -->
        <label>Take Profit:</label>
        <input type="number" step="0.00001" id="take_profit" placeholder="1.14747">

        <!-- Result selection -->
        <label>Result:</label>
        <select name="result" id="result">
            <option value="WIN">WIN</option>
            <option value="LOSS">LOSS</option>
            <option value="BREAKEVEN">BREAKEVEN</option>
        </select>

        <!-- R Multiple -->
        <label>R Multiple:</label>
        <input type="number" step="0.1" id="r_multiple" placeholder="2.0">

        <!-- Account selection -->
        <label>Account:</label>
        <select name="account" id="account">
            <option value="Account 1">Account 1</option>
            <option value="Account 2">Account 2</option>
        </select>

        <!-- Date -->
        <label>Date:</label>
        <input type="date" id="date">

        <!-- Notes -->
        <label>Notes:</label>
        <textarea id="notes" placeholder="Setup notes..."></textarea>

        <!-- Submit button -->
        <button type="button" onclick="submitTrade()">Log Trade</button>
        
    </form>

    <!-- Message area — shows success or error after submitting -->
    <p id="message"></p>

    <!-- JavaScript to handle form submission -->
    <script>
        function submitTrade() {
            // Collect all form values into an object
            const trade = {
                pair: document.getElementById('pair').value,
                session: document.getElementById('session').value,
                entry: parseFloat(document.getElementById('entry').value),
                stop_loss: parseFloat(document.getElementById('stop_loss').value),
                take_profit: parseFloat(document.getElementById('take_profit').value),
                result: document.getElementById('result').value,
                r_multiple: parseFloat(document.getElementById('r_multiple').value),
                account: document.getElementById('account').value,
                date: document.getElementById('date').value,
                notes: document.getElementById('notes').value
            };

            // Send the trade data to our Flask API using fetch
            fetch('/trades', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(trade)
            })
            .then(response => response.json())
            .then(data => {
                // Show success message
                document.getElementById('message').innerText = 'Trade logged successfully!';
            })
            .catch(error => {
                // Show error message
                document.getElementById('message').innerText = 'Error logging trade.';
            });
        }
    </script>

</body>
</html>
